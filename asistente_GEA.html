<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Ania | Gobierno del Estado de Aguascalientes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/estilos.css">
  </head>
<body>

  <div class="app">
  <div class="avatar-section d-flex align-items-center justify-content-center">
    <img id="sideAvatar" src="avatares/ania/ania_saludando.png" alt="Ania">
  </div>

  <div class="chat-container">
    <div id="chatHistory"></div>

    <div class="controls">
      <div class="w-100">
        <div id="assistantStatus" class="status-indicator">Presiona el micrófono para iniciar</div>
        <div class="d-flex gap-2">
          <input type="text" id="userInput" class="form-control" placeholder="Escribe tu duda aquí...">
          <button id="btnAction" class="btn btn-primary btn-mic">🎤 Iniciar Voz</button>
        </div>
      </div>
    </div>
  </div>
</div>

  <script src="js/asistente_logic.js"></script>
</body>
</html>
