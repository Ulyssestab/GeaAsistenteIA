<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo - Abrir Asistente en Pestaña</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --line:#e2e8f0;
      --text:#0f172a;
      --muted:#475569;
      --brand:#1d4ed8;
      --ok:#16a34a;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      background:var(--bg); color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    header{
      background:#0f172a; color:#fff; padding:14px 18px;
      font-weight:700;
    }
    main{ max-width:1100px; margin:0 auto; padding:18px; }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      box-shadow:0 8px 18px rgba(0,0,0,.05);
      margin-bottom:14px;
    }
    h1,h2,h3{ margin:0 0 10px; }
    p{ margin:0 0 10px; color:var(--muted); }

    .grid{ display:grid; gap:12px; }
    .g2{ grid-template-columns:repeat(2,minmax(0,1fr)); }
    .g3{ grid-template-columns:repeat(3,minmax(0,1fr)); }

    .field{ display:flex; flex-direction:column; gap:6px; }
    label{
      font-weight:700; font-size:13px; color:#334155;
    }
    input,select{
      height:42px; border-radius:10px; border:1px solid var(--line);
      padding:0 10px; font-size:14px; outline:none; width:100%; background:#fff;
    }
    input:focus,select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px rgba(59,130,246,.15);
    }

    .actions{ display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
    .btn{
      height:42px; border-radius:10px; border:0; padding:0 14px; cursor:pointer; font-weight:700;
    }
    .btn-primary{ background:var(--brand); color:#fff; }
    .btn-secondary{ background:#0ea5e9; color:#fff; }
    .btn-ghost{ background:#e2e8f0; color:#0f172a; }
    .btn:hover{ filter:brightness(1.03); }

    .pill{
      display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line);
      border-radius:999px; padding:6px 10px; background:#fff; font-size:12px;
      margin-top:10px;
    }
    .dot{
      width:8px; height:8px; border-radius:999px; background:var(--ok);
      display:inline-block;
    }

    .small{ font-size:12px; color:#64748b; }

    /* Sticker flotante */
    #stickerBtn{
      position:fixed; right:24px; bottom:24px; z-index:2147483647;
      background:transparent; border:0; padding:0; margin:0; cursor:pointer;
      display:none; pointer-events:auto; touch-action:manipulation;
    }
    #stickerImg{
      width:180px; height:auto; display:block; object-fit:contain;
      filter:drop-shadow(0 12px 26px rgba(0,0,0,.22));
      user-select:none; -webkit-user-select:none;
    }

    @media (max-width:900px){
      .g2,.g3{ grid-template-columns:1fr; }
      #stickerImg{ width:130px; }
    }
  </style>
</head>
<body>
  <header>Demo lanzador · abre <strong>ventana-demo_sin-azure.html</strong> en otra pestaña</header>

  <main>
    <div class="card">
      <h2>Configuración rápida</h2>
      <p>Esta versión abre el asistente en una pestaña nueva (target <code>_blank</code>).</p>

      <div class="grid g3">
        <div class="field">
          <label for="title">Título</label>
          <input id="title" value="Ania" />
        </div>
        <div class="field">
          <label for="provider">Proveedor de voz</label>
          <select id="provider">
            <option value="browser">Browser (local)</option>
<option value="elevenlabs" selected>ElevenLabs</option>
          </select>
        </div>
        <div class="field">
          <label for="lang">Idioma</label>
          <input id="lang" value="es-MX" />
        </div>
      </div>

      <div class="grid g2" style="margin-top:10px;">
        <div class="field">
          <label for="windowUrl">Archivo ventana</label>
          <input id="windowUrl" value="./ventana-demo_sin-azure_mcp.html" />
        </div>
        <div class="field">
          <label for="apiUrl">API IA</label>
          <input id="apiUrl" value="/GeaAsistenteHub/api/agentemcp.ashx" />
        </div>
      </div>

      <div class="grid g2" style="margin-top:10px;">
        <div class="field">
          <label for="ttsUrl">TTS endpoint</label>
          <input id="ttsUrl" value="/GeaAsistenteHub/api/tts.ashx" />
        </div>
        <div class="field">
          <label for="stickerWidth">Sticker width (px)</label>
          <input id="stickerWidth" value="180" />
        </div>
      </div>

      <div class="grid g2" style="margin-top:10px;">
        <div class="field" id="azureField" style="display:none;">
          <label for="azureVoice">Azure voice</label>
          <input id="azureVoice" value="" />
        </div>
        <div class="field" id="elevenField" style="display:none;">
          <label for="elevenVoice">Eleven voice ID</label>
          <input id="elevenVoice" value="EXAVITQu4vr4xnSDxMaL" />
        </div>
      </div>

      <div class="actions">
        <button id="btnOpen" class="btn btn-primary" type="button">Abrir asistente en otra pestaña</button>
        <button id="btnSticker" class="btn btn-secondary" type="button">Mostrar sticker</button>
        <button id="btnHideSticker" class="btn btn-ghost" type="button">Ocultar sticker</button>
      </div>

      <div class="pill">
        <span class="dot"></span>
        <span>Estado:</span>
        <strong id="status">Listo</strong>
      </div>
    </div>

    <div class="card">
      <h3>Avatares</h3>
      <p class="small">Puedes cambiar rutas aquí.</p>

      <div class="grid g2">
        <div class="field">
          <label for="avatarIdle">Idle / Saludando</label>
          <input id="avatarIdle" value="/GeaAsistenteHub/avatares/ania/ania_saludando.png" />
        </div>
        <div class="field">
          <label for="avatarListen">Escuchando</label>
          <input id="avatarListen" value="/GeaAsistenteHub/avatares/ania/ania_escuchando.png" />
        </div>
        <div class="field">
          <label for="avatarRead">Leyendo</label>
          <input id="avatarRead" value="/GeaAsistenteHub/avatares/ania/ania_leyendo.png" />
        </div>
        <div class="field">
          <label for="avatarThink">Pensando</label>
          <input id="avatarThink" value="/GeaAsistenteHub/avatares/ania/ania_pensando.png" />
        </div>
        <div class="field">
          <label for="avatarTalk">Hablando</label>
          <input id="avatarTalk" value="/GeaAsistenteHub/avatares/ania/ania_hablando.png" />
        </div>
      </div>
    </div>
  </main>

  <!-- Sticker -->
  <button id="stickerBtn" type="button" aria-label="Abrir asistente">
    <img id="stickerImg" alt="Abrir asistente" draggable="false" />
  </button>

  <script src="./demo.js?v=20260225-voicefix"></script>
</body>
</html>
